services:
  # ─────────────────────────────────────────────
  # MalikClaw Agent (one-shot query)
  #   docker compose -f docker/docker-compose.yml run --rm malikclaw-agent -m "Hello"
  # ─────────────────────────────────────────────
  malikclaw-agent:
    image: docker.io/sipeed/malikclaw:latest
    container_name: malikclaw-agent
    profiles:
      - agent
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.malikclaw
    entrypoint: ["malikclaw", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # MalikClaw Gateway (Long-running Bot)
  #   docker compose -f docker/docker-compose.yml --profile gateway up
  # ─────────────────────────────────────────────
  malikclaw-gateway:
    image: docker.io/sipeed/malikclaw:latest
    container_name: malikclaw-gateway
    restart: on-failure
    profiles:
      - gateway
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.malikclaw

  # ─────────────────────────────────────────────
  # MalikClaw Launcher (Web Console + Gateway)
  #   docker compose -f docker/docker-compose.yml --profile launcher up
  # ─────────────────────────────────────────────
  malikclaw-launcher:
    image: docker.io/sipeed/malikclaw:launcher
    container_name: malikclaw-launcher
    restart: on-failure
    profiles:
      - launcher
    environment:
      - MALIKCLAW_GATEWAY_HOST=0.0.0.0
    ports:
      - "127.0.0.1:18800:18800"
      - "127.0.0.1:18790:18790"
    volumes:
      - ./data:/root/.malikclaw
