services:
  # ─────────────────────────────────────────────
  # MalikClaw Agent (one-shot query) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml run --rm malikclaw-agent -m "Hello"
  # ─────────────────────────────────────────────
  malikclaw-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: malikclaw-agent-full
    profiles:
      - agent
    volumes:
      - ../config/config.json:/root/.malikclaw/config.json:ro
      - malikclaw-workspace:/root/.malikclaw/workspace
      - malikclaw-npm-cache:/root/.npm # npm cache for faster MCP server installs
    entrypoint: ["malikclaw", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # MalikClaw Gateway (Long-running Bot) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml --profile gateway up
  # ─────────────────────────────────────────────
  malikclaw-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: malikclaw-gateway-full
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      # Configuration file
      - ../config/config.json:/root/.malikclaw/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - malikclaw-workspace:/root/.malikclaw/workspace
      # NPM cache for faster MCP server installs
      - malikclaw-npm-cache:/root/.npm
    command: ["gateway"]

volumes:
  malikclaw-workspace:
  malikclaw-npm-cache: # Cache npm packages to speed up MCP server installations
